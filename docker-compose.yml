version: '3.8'

services:
  # --- TIMESCALEDB ---
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: pulseai-timescaledb
    environment:
      POSTGRES_DB: pulseai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pulseai_secure_pass_2026
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    networks:
      - pulseai-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pulseai"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- REDIS ---
  redis:
    image: redis:alpine
    container_name: pulseai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - pulseai-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- ZOOKEEPER ---
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: pulseai-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - pulseai-net
    healthcheck:
      test: echo ruok | nc localhost 2181 || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

  # --- KAFKA ---
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: pulseai-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    networks:
      - pulseai-net
    healthcheck:
      test: kafka-topics --bootstrap-server localhost:9092 --list || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

  # --- KAFKA UI ---
  kafka-ui:
    image: provectus/kafka-ui:latest
    container_name: pulseai-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      DYNAMIC_CONFIG_ENABLED: 'true'
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - pulseai-net

  # --- APPLICATION SERVICES (BUILD STUBS) ---
  ingest-gateway:
    build:
      context: ./services/ingest-gateway
      dockerfile: Dockerfile
    container_name: pulseai-ingest-gateway
    ports:
      - "3000:3000"
    environment:
      - TIMESCALEDB_HOST=timescaledb
      - REDIS_HOST=redis
      - KAFKA_BROKERS=kafka:29092
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - pulseai-net

  stream-processor:
    build:
      context: ./services/stream-processor
      dockerfile: Dockerfile
    container_name: pulseai-stream-processor
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://timescaledb:5432/pulseai
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - SPRING_DATA_REDIS_HOST=redis
    depends_on:
      timescaledb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - pulseai-net

  diagnosis-service:
    build:
      context: ./services/diagnosis-service
      dockerfile: Dockerfile
    container_name: pulseai-diagnosis-service
    ports:
      - "3001:3001"
    environment:
      - TIMESCALEDB_HOST=timescaledb
      - REDIS_HOST=redis
      - KAFKA_BROKERS=kafka:29092
    depends_on:
      timescaledb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - pulseai-net

  alert-service:
    build:
      context: ./services/alert-service
      dockerfile: Dockerfile
    container_name: pulseai-alert-service
    ports:
      - "3002:3002"
    environment:
      - TIMESCALEDB_HOST=timescaledb
      - REDIS_HOST=redis
      - KAFKA_BROKERS=kafka:29092
    depends_on:
      timescaledb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - pulseai-net

  api-service:
    build:
      context: ./services/api-service
      dockerfile: Dockerfile
    container_name: pulseai-api-service
    ports:
      - "3003:3003"
    environment:
      - TIMESCALEDB_HOST=timescaledb
      - REDIS_HOST=redis
      - KAFKA_BROKERS=kafka:29092
    depends_on:
      timescaledb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - pulseai-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pulseai-frontend
    ports:
      - "4000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3003
    depends_on:
      - api-service
    networks:
      - pulseai-net

networks:
  pulseai-net:
    name: pulseai-net
    driver: bridge

volumes:
  timescaledb_data:
  redis_data:
