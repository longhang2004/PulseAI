server:
  port: 8080

spring:
  application:
    name: stream-processor

  # Datastore Configuration (TimescaleDB / PostgreSQL)
  datasource:
    url: jdbc:postgresql://${TIMESCALEDB_HOST:localhost}:${TIMESCALEDB_PORT:5432}/${TIMESCALEDB_DB:pulseai}
    username: ${TIMESCALEDB_USER:postgres}
    password: ${TIMESCALEDB_PASSWORD:pulseai_secure_pass_2026}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Redis config
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # Kafka config
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    consumer:
      group-id: pulseai-stream-processor-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    listener:
      concurrency: 5 # Safe default concurrency for standard OS. If Java 21 is used, this could use virtual threads.
